name: Bug report
description: Report a bug in Neon Vision Editor
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail so it can be reproduced.

  - type: input
    id: version
    attributes:
      label: App version
      description: Which version/tag are you using?
      placeholder: "v0.4.32"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where does this issue happen?
      options:
        - macOS
        - iOS
        - iPadOS
        - Multiple platforms
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: "macOS 26.2 / iOS 18.6 / iPadOS 18.6"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact steps to trigger the problem
      placeholder: |
        1. Open file ...
        2. Scroll to ...
        3. Observe ...
    validations:
      required: true

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      description: How often does this happen?
      options:
        - Always
        - Often
        - Sometimes
        - Rarely
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, sample files, logs, etc.
    validations:
      required: false

  - type: dropdown
    id: accessibility_impact
    attributes:
      label: Accessibility impact
      options:
        - None known
        - VoiceOver issue
        - Keyboard navigation issue
        - Focus trap / focus order issue
        - Unsure
    validations:
      required: true
