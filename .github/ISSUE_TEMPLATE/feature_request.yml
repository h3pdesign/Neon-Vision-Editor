name: Feature request
description: Suggest an idea or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please keep requests aligned with the project's scope (lightweight native macOS editor).

  - type: input
    id: version
    attributes:
      label: Current app version
      description: Which version are you currently using?
      placeholder: "v0.4.32"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Target platform
      options:
        - macOS
        - iOS
        - iPadOS
        - Cross-platform
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version (if relevant)
      placeholder: "macOS 26.2 / iOS 18.6 / iPadOS 18.6"
    validations:
      required: true

  - type: input
    id: device_model
    attributes:
      label: Device model (if relevant)
      placeholder: "MacBook Pro M3 / iPad Pro 13-inch (M5) / iPhone 16 Pro"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: repro_or_current_flow
    attributes:
      label: Current flow (repro of the gap)
      description: How does the current flow behave today?
      placeholder: |
        1. Open ...
        2. Try ...
        3. Observe limitation ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: Describe the expected end-user behavior after implementation.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Clear bullets that define done behavior.
      placeholder: |
        - [ ] User can ...
        - [ ] Works on ...
        - [ ] Does not regress ...
    validations:
      required: true

  - type: dropdown
    id: discoverability
    attributes:
      label: Discoverability preference
      description: Where should users find this feature?
      options:
        - Toolbar action
        - Menu command
        - Settings
        - Context menu
        - Automatic behavior
        - Unsure
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you try?
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Mockups / screenshots / references
      description: Attach visuals or links to illustrate the request.
      placeholder: "Drag files here or paste links."
    validations:
      required: false
