name: Regression report
description: Report behavior that worked before and is now broken
title: "[Regression]: "
labels: ["bug", "regression"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a regression. Please include the last known good version and first bad version if possible.

  - type: input
    id: version_current
    attributes:
      label: Current app version (broken)
      placeholder: "v0.4.32"
    validations:
      required: true

  - type: input
    id: version_last_good
    attributes:
      label: Last known good version
      placeholder: "v0.4.31"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - iOS
        - iPadOS
        - Multiple platforms
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: "macOS 26.2 / iOS 18.6 / iPadOS 18.6"
    validations:
      required: true

  - type: textarea
    id: what_changed
    attributes:
      label: What changed?
      description: Describe what used to work and what now fails.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
