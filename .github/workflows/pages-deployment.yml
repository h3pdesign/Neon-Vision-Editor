name: Pages Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Commit, branch, or tag to deploy"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref || github.sha }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
          error_count: 30

      - name: Wait before retrying Pages deploy
        if: ${{ steps.deployment.outcome == 'failure' }}
        run: sleep 60

      - name: Retry GitHub Pages deploy
        id: deployment_retry
        if: ${{ steps.deployment.outcome == 'failure' }}
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
          error_count: 30
