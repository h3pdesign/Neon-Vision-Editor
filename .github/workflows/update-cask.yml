name: Update Cask

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sync, e.g. v0.8.4. Defaults to latest release."
        required: false
  release:
    types: [published]

permissions:
  contents: read

jobs:
  dispatch-homebrew-tap:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG:-}"
          if [[ -z "$tag" ]]; then
            tag="$(gh release view --json tagName --jq .tagName)"
          fi
          if [[ "$tag" != v* ]]; then
            tag="v${tag}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Dispatch homebrew-tap cask update
        env:
          GH_TOKEN: ${{ secrets.TAP_BOT_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "Missing TAP_BOT_TOKEN; cannot dispatch h3pdesign/homebrew-tap." >&2
            exit 1
          fi
          gh api repos/h3pdesign/homebrew-tap/dispatches \
            -f event_type=notarized_release \
            -f client_payload[tag]="$TAG_NAME"
