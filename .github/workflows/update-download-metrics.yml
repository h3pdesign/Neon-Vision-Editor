name: Update Download & Traffic Metrics

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update README metrics and traffic chart
        env:
          GH_TOKEN: ${{ secrets.METRIC_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/update_download_metrics.py --require-traffic-api

      - name: Configure signed commits (GPG)
        env:
          METRICS_SIGNING_GPG_KEY: ${{ secrets.METRICS_SIGNING_GPG_KEY }}
          METRICS_SIGNING_GPG_PASSPHRASE: ${{ secrets.METRICS_SIGNING_GPG_PASSPHRASE }}
          METRICS_SIGNING_NAME: ${{ secrets.METRICS_SIGNING_NAME }}
          METRICS_SIGNING_EMAIL: ${{ secrets.METRICS_SIGNING_EMAIL }}
        run: |
          set -euo pipefail

          if [ -z "${METRICS_SIGNING_GPG_KEY:-}" ]; then
            echo "Missing secret: METRICS_SIGNING_GPG_KEY"
            echo "Refusing to create unsigned metrics commits."
            exit 1
          fi

          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          echo "pinentry-mode loopback" >> "$GNUPGHOME/gpg.conf"
          echo "allow-loopback-pinentry" >> "$GNUPGHOME/gpg-agent.conf"

          printf '%s' "$METRICS_SIGNING_GPG_KEY" | gpg --batch --import
          SIGNING_KEY_ID="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')"
          if [ -z "$SIGNING_KEY_ID" ]; then
            echo "No secret signing key available after import."
            exit 1
          fi

          if [ -n "${METRICS_SIGNING_GPG_PASSPHRASE:-}" ]; then
            echo "warmup" | gpg --batch --yes --pinentry-mode loopback --passphrase "$METRICS_SIGNING_GPG_PASSPHRASE" -u "$SIGNING_KEY_ID" --clearsign >/dev/null
          fi

          git config user.name "${METRICS_SIGNING_NAME:-h3p}"
          git config user.email "${METRICS_SIGNING_EMAIL:-apps@hpedersen.de}"
          git config gpg.program gpg
          git config user.signingkey "$SIGNING_KEY_ID"
          git config commit.gpgsign true

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No metrics changes."
            exit 0
          fi

          git add README.md docs/images/release-download-trend*.svg
          git commit -S -m "docs: refresh download metrics chart"
          git push
