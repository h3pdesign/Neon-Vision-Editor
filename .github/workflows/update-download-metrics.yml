name: Update Download & Traffic Metrics

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update README metrics and traffic chart
        env:
          GH_TOKEN: ${{ secrets.METRIC_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/update_download_metrics.py --require-traffic-api

      - name: Configure signed commits (SSH)
        env:
          METRICS_SIGNING_SSH_KEY: ${{ secrets.METRICS_SIGNING_SSH_KEY }}
          METRICS_SIGNING_NAME: ${{ secrets.METRICS_SIGNING_NAME }}
          METRICS_SIGNING_EMAIL: ${{ secrets.METRICS_SIGNING_EMAIL }}
        run: |
          set -euo pipefail

          if [ -z "${METRICS_SIGNING_SSH_KEY:-}" ]; then
            echo "Missing secret: METRICS_SIGNING_SSH_KEY"
            echo "Refusing to create unsigned metrics commits."
            exit 1
          fi

          SIGNING_KEY_PATH="$RUNNER_TEMP/metrics_signing_ssh_key"
          SIGNING_PUB_KEY_PATH="$RUNNER_TEMP/metrics_signing_ssh_key.pub"
          if printf '%s' "$METRICS_SIGNING_SSH_KEY" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf '%s\n' "$METRICS_SIGNING_SSH_KEY" > "$SIGNING_KEY_PATH"
          else
            printf '%s' "$METRICS_SIGNING_SSH_KEY" | base64 -d > "$SIGNING_KEY_PATH"
          fi
          perl -pi -e 's/\r$//' "$SIGNING_KEY_PATH"
          chmod 600 "$SIGNING_KEY_PATH"
          ssh-keygen -y -f "$SIGNING_KEY_PATH" > "$SIGNING_PUB_KEY_PATH"

          git config user.name "${METRICS_SIGNING_NAME:-h3p}"
          git config user.email "${METRICS_SIGNING_EMAIL:-apps@hpedersen.de}"
          git config gpg.format ssh
          git config user.signingkey "$SIGNING_PUB_KEY_PATH"
          git config commit.gpgsign true

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No metrics changes."
            exit 0
          fi

          git add README.md docs/images/release-download-trend*.svg
          git commit -S -m "docs: refresh download metrics chart"
          git push
