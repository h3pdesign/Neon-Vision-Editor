<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1050" viewBox="0 0 2000 1050">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#050a2a"/>
<stop offset="55%" stop-color="#1b1850"/>
<stop offset="100%" stop-color="#41123a"/>
</linearGradient>

<linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#4dd9ff"/>
<stop offset="50%" stop-color="#9d63ff"/>
<stop offset="100%" stop-color="#ff689a"/>
</linearGradient>

<filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
<feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
</filter>
